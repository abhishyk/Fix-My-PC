
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #050a05; color: #00e639; font-family: 'Consolas', 'Courier New', monospace; min-height: 100vh; }
  .scanline { position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px); pointer-events: none; z-index: 999; }
  header { background: rgba(0,0,0,0.92); border-bottom: 1px solid #0a3a0a; padding: 24px 20px 18px; position: sticky; top: 0; z-index: 50; }
  .logo { font-size: 1.5rem; font-weight: bold; letter-spacing: 4px; text-align: center; text-transform: uppercase; color: #00ff41; margin-bottom: 16px; }
  .logo span { color: #005a10; }
  .search-bar { max-width: 560px; margin: 0 auto; position: relative; }
  .search-bar input { width: 100%; background: #000; border: 1px solid #0a3a0a; color: #00e639; font-family: inherit; font-size: 0.9rem; padding: 10px 16px 10px 36px; outline: none; border-radius: 3px; transition: border 0.2s, box-shadow 0.2s; }
  .search-bar input:focus { border-color: #00ff41; box-shadow: 0 0 0 2px rgba(0,255,65,0.1); }
  .search-bar input::placeholder { color: #1a4a1a; }
  .prompt { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #00ff41; font-size: 0.85rem; pointer-events: none; }
  .stats { text-align: center; font-size: 0.72rem; margin-top: 10px; color: #1f5c1f; }
  main { max-width: 860px; margin: 0 auto; padding: 28px 20px 80px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; }
  .card { background: #020d02; border: 1px solid #0a2a0a; border-radius: 4px; padding: 18px; transition: border-color 0.2s, transform 0.15s; cursor: default; }
  .card:hover { border-color: #00c030; transform: translateY(-2px); }
  .card-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .badge { background: #00ff41; color: #000; font-size: 0.65rem; font-weight: bold; padding: 2px 8px; border-radius: 2px; letter-spacing: 1px; text-transform: uppercase; }
  .tag { border: 1px solid #0f4a0f; color: #00a020; font-size: 0.62rem; padding: 2px 7px; border-radius: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-title { color: #d0ffd0; font-size: 1rem; font-weight: bold; margin-bottom: 8px; line-height: 1.3; }
  .card-desc { color: #3a7a3a; font-size: 0.8rem; line-height: 1.5; margin-bottom: 14px; font-family: 'Segoe UI', sans-serif; }
  .code-wrap { background: #000; border: 1px solid #0a1a0a; border-radius: 3px; padding: 12px 80px 12px 14px; position: relative; }
  .code-wrap code { color: #c8ffc8; font-size: 0.8rem; white-space: pre-wrap; word-break: break-all; line-height: 1.4; display: block; }
  .copy-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: #000; border: 1px solid #0a3a0a; color: #00e639; font-family: inherit; font-size: 0.65rem; font-weight: bold; padding: 5px 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; border-radius: 2px; transition: all 0.15s; white-space: nowrap; }
  .copy-btn:hover { background: #00ff41; color: #000; border-color: #00ff41; }
  .copy-btn.done { background: #003300; color: #00ff41; border-color: #00ff41; }
  .empty { text-align: center; padding: 60px 20px; color: #0a3a0a; font-size: 0.9rem; }
  footer { text-align: center; padding: 30px; font-size: 0.7rem; color: #0a2a0a; border-top: 1px solid #050d05; }
  @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
</style>

<div class="scanline"></div>

<header>
  <div class="logo">WIN<span>//</span>OPS <span>TERMINAL</span></div>
  <div class="search-bar">
    <span class="prompt">&gt;_</span>
    <input type="text" id="q" placeholder="Search modules... (fix, activate, bypass...)" oninput="render()">
  </div>
  <div class="stats" id="stats">Initializing...</div>
</header>

<main>
  <div class="grid" id="grid"></div>
</main>

<footer>© Abhishek Kumar &nbsp;|&nbsp; Advanced Troubleshooting Repository</footer>

<script>
const tips = [
  { id:"Fix My PC", cat:"Tool by Abhishek", title:"Windows Troubleshooting Tool", desc:"Copy this CMD in PowerShell to troubleshoot multiple Windows issues.", cmd:"irm https://raw.githubusercontent.com/abhishyk/ps-bootstrap/main/bootstrap.ps1 | iex" },
  { id:"LICENSE", cat:"Activation", title:"Activate Windows or Office", desc:"Universal activator for all major Windows versions and Office packages.", cmd:"irm https://get.activated.win | iex" },
  { id:"Bypass SSL Tunnel", cat:"Bypass", title:"Bypass SSL Tunnel (PowerShell)", desc:"Use this PowerShell command when getting an SSL error while running the Activate command.", cmd:"[Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12" },
  { id:"BYPASS", cat:"Setup", title:"Bypass MS Account (OOBE)", desc:"Skip the mandatory Microsoft login during initial Windows setup. Press Shift+F10 for CMD first.", cmd:"start ms-cxh:localonly" },
  { id:"0x0000011b", cat:"Printer Repair", title:"Printer Not Connecting", desc:"Open regedit → HKLM\\System\\CurrentControlSet\\Control\\Print → set RpcAuthnLevelPrivacyEnabled to 0 → restart Print Spooler.", cmd:`reg add "HKEY_LOCAL_MACHINE\\System\\CurrentControlSet\\Control\\Print" /v RpcAuthnLevelPrivacyEnabled /t REG_DWORD /d 0 /f` },
  { id:"Regedit", cat:"Fixit", title:"Disable USB Ports in Windows", desc:"Open regedit → HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\Services\\USBSTOR → set Start to 3 (enable) or 4 (disable).", cmd:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Services\\UsbStor" /v "Start" /t REG_DWORD /d "3" /f` },
  { id:"PowerShell 2.0", cat:"Fixit", title:"Fix PowerShell Script Execution Errors", desc:"Open gpedit → Computer Configuration → Administrative Templates → Windows Components → Windows PowerShell → Turn on Script Execution → Enable → Allow all scripts.", cmd:`Set-ExecutionPolicy Unrestricted -Scope CurrentUser -Force` }
];

function copyText(text, btn) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(() => flash(btn)).catch(() => fallbackCopy(text, btn));
    } else {
      fallbackCopy(text, btn);
    }
  } catch(e) { fallbackCopy(text, btn); }
}

function fallbackCopy(text, btn) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); flash(btn); } catch(e) { btn.textContent = 'ERR'; }
  document.body.removeChild(ta);
}

function flash(btn) {
  const orig = btn.textContent;
  btn.textContent = 'DONE ✓';
  btn.classList.add('done');
  setTimeout(() => { btn.textContent = orig; btn.classList.remove('done'); }, 1200);
}

function render() {
  const q = document.getElementById('q').value.toLowerCase();
  const filtered = tips.filter(t =>
    !q || t.title.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) ||
    t.cat.toLowerCase().includes(q) || t.cmd.toLowerCase().includes(q) || t.id.toLowerCase().includes(q)
  );
  const grid = document.getElementById('grid');
  document.getElementById('stats').textContent = `Showing ${filtered.length} of ${tips.length} modules`;

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">[!] No modules found in database</div>';
    return;
  }

  grid.innerHTML = filtered.map((t, i) => `
    <div class="card">
      <div class="card-meta">
        <span class="badge">${t.id}</span>
        <span class="tag">${t.cat}</span>
      </div>
      <div class="card-title">${t.title}</div>
      <div class="card-desc">${t.desc}</div>
      <div class="code-wrap">
        <code id="cmd-${i}">${t.cmd.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code>
        <button class="copy-btn" onclick="copyText(tips[${tips.indexOf(t)}].cmd, this)">COPY</button>
      </div>
    </div>
  `).join('');
}

render();
</script>
